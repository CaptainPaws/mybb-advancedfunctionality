<div class="af-inv-page af-aa-context af-aa-context--inventory" data-af-apui-surface="inventory" data-af-modal-kind="inventory" data-owner="{$ownerUid}" data-default-tab="{$defaultTab}" data-entity-base="{$entityUrlBase}" data-first-url="{$firstPanelUrl}">
    <div class="af-inv-shell">
        <input type="hidden" name="my_post_key" value="{$mybb->post_code}">

        <div class="af-inv-head">
            <h1>Инвентарь: {$user['username']}</h1>
            <div class="af-inv-wallet" data-af-wallet>
                <span>Баланс кошелька:</span>
                <span class="af-inv-wallet__item" data-af-wallet-item="credits">
                    <span class="af-inv-wallet__label">{$walletCreditsLabel}:</span>
                    <strong data-af-wallet-balance="credits">{$walletCreditsMajor}</strong>
                    <span data-af-wallet-symbol="credits">{$walletCreditsSymbol}</span>
                </span>
                <span class="af-inv-wallet__sep">·</span>
                <span class="af-inv-wallet__item" data-af-wallet-item="ability_tokens">
                    <span class="af-inv-wallet__label">{$walletAbilityLabel}:</span>
                    <strong data-af-wallet-balance="ability_tokens">{$walletAbilityMajor}</strong>
                    <span data-af-wallet-symbol="ability_tokens">{$walletAbilitySymbol}</span>
                </span>
            </div>
        </div>

        <div class="af-inv-tabs">{$tabLinks}</div>

        <div class="af-inv-tab-content">
            <div class="af-inv-panel" id="af-inv-panel">{$firstPanelHtml}</div>
        </div>
    </div>
</div>
