<form class="af-kb-search" method="get" action="misc.php">
    <input type="hidden" name="action" value="kb" />
    <input type="hidden" name="type" value="{$kb_type_value}" />
    <input type="text" name="q" value="{$kb_query}" placeholder="{$lang->af_kb_search_placeholder}" />
</form>
<div class="af-kb-header">
    <div class="af-kb-type-header">
        <div class="af-kb-actions">
        {$kb_type_actions}
        {$kb_help_link}
        </div>
        <h1>{$kb_type_icon}{$kb_type_title}</h1>
        {$kb_banner}
        <div class="af-kb-type-desc">{$kb_type_description}</div>
    </div>
</div>
{$kb_categories_panel}
<div class="af-kb-list-main">
    <div class="af-kb-entries{$kb_entries_class}"{$kb_entries_style}>
        {$kb_entries_rows}
    </div>
</div>
<div class="af-kb-pagination">{$kb_pagination}</div>
