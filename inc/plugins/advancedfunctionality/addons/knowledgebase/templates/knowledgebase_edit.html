<div class="af-kb-header">
    <h1>{$lang->af_kb_edit}</h1>
    <a class="af-kb-btn" href="misc.php?action=kb&type={$kb_type_value}&amp;key={$kb_key_value}">{$lang->af_kb_cancel}</a>
</div>
{$kb_errors}
<form class="af-kb-form" method="post" action="misc.php?action=kb_edit">
    <input type="hidden" name="my_post_key" value="{$mybb->post_code}" />
    <section>
        <h3>Основные данные</h3>
        <div class="af-kb-row">
            <div>
                <label>Type</label>
                <input type="text" name="type" value="{$kb_type_value}" required />
            </div>
            <div>
                <label>Key</label>
                <input type="text" name="key" value="{$kb_key_value}" required />
            </div>
        </div>
        <div class="af-kb-row">
            <div>
                <label>Заголовок (RU)</label>
                <input type="text" name="title_ru" value="{$kb_title_ru}" />
            </div>
            <div>
                <label>Заголовок (EN)</label>
                <input type="text" name="title_en" value="{$kb_title_en}" />
            </div>
        </div>
        <label>Краткое описание (RU)</label>
        <textarea name="short_ru">{$kb_short_ru}</textarea>
        <label>Краткое описание (EN)</label>
        <textarea name="short_en">{$kb_short_en}</textarea>
        <label>Полное описание (RU)</label>
        <textarea name="body_ru">{$kb_body_ru}</textarea>
        <label>Полное описание (EN)</label>
        <textarea name="body_en">{$kb_body_en}</textarea>
        <div class="af-kb-row">
            <div>
                <label>Meta JSON</label>
                <textarea name="meta_json">{$kb_meta_json}</textarea>
            </div>
            <div>
                <label>Порядок</label>
                <input type="text" name="sortorder" value="{$kb_sortorder}" />
                <div class="af-kb-inline">
                    <label>Активно</label>
                    <input type="checkbox" name="active" value="1" {$kb_active_checked} />
                </div>
            </div>
        </div>
    </section>
    {$kb_type_manage_section}
    <section>
        <h3>Блоки</h3>
        <div id="af-kb-blocks" data-index="{$kb_blocks_index}">
            {$kb_blocks_rows}
        </div>
        <button type="button" class="af-kb-add" id="af-kb-add-block">Добавить блок</button>
    </section>
    <section>
        <h3>Связи</h3>
        <div id="af-kb-relations" data-index="{$kb_relations_index}">
            {$kb_relations_rows}
        </div>
        <button type="button" class="af-kb-add" id="af-kb-add-relation">Добавить связь</button>
    </section>
    <div class="af-kb-inline">
        <button type="submit" class="af-kb-btn">{$lang->af_kb_save}</button>
        <a class="af-kb-btn" href="misc.php?action=kb&type={$kb_type_value}&amp;key={$kb_key_value}">{$lang->af_kb_cancel}</a>
        {$kb_delete_button}
    </div>
</form>

<script type="text/template" id="af-kb-block-template">
    <div class="af-kb-block-item">
        <div class="af-kb-row">
            <div>
                <label>Block key</label>
                <input type="text" name="blocks[__INDEX__][block_key]" value="" />
            </div>
            <div>
                <label>Порядок</label>
                <input type="text" name="blocks[__INDEX__][sortorder]" value="0" />
                <div class="af-kb-inline">
                    <label>Активно</label>
                    <input type="checkbox" name="blocks[__INDEX__][active]" value="1" checked="checked" />
                </div>
            </div>
        </div>
        <div class="af-kb-row">
            <div>
                <label>Заголовок (RU)</label>
                <input type="text" name="blocks[__INDEX__][title_ru]" value="" />
            </div>
            <div>
                <label>Заголовок (EN)</label>
                <input type="text" name="blocks[__INDEX__][title_en]" value="" />
            </div>
        </div>
        <label>Контент (RU)</label>
        <textarea name="blocks[__INDEX__][content_ru]"></textarea>
        <label>Контент (EN)</label>
        <textarea name="blocks[__INDEX__][content_en]"></textarea>
        <label>Data JSON</label>
        <textarea name="blocks[__INDEX__][data_json]">{}</textarea>
        <button type="button" class="af-kb-remove">Удалить блок</button>
    </div>
</script>

<script type="text/template" id="af-kb-relation-template">
    <div class="af-kb-rel-item-edit">
        <div class="af-kb-row">
            <div>
                <label>Relation type</label>
                <input type="text" name="relations[__INDEX__][rel_type]" value="" />
            </div>
            <div>
                <label>To type</label>
                <input type="text" name="relations[__INDEX__][to_type]" value="" />
            </div>
            <div>
                <label>To key</label>
                <input type="text" name="relations[__INDEX__][to_key]" value="" />
            </div>
        </div>
        <div class="af-kb-row">
            <div>
                <label>Meta JSON</label>
                <textarea name="relations[__INDEX__][meta_json]">{}</textarea>
            </div>
            <div>
                <label>Порядок</label>
                <input type="text" name="relations[__INDEX__][sortorder]" value="0" />
            </div>
        </div>
        <button type="button" class="af-kb-remove">Удалить связь</button>
    </div>
</script>
