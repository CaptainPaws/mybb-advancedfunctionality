<div class="af-inventory" data-uid="{$inventory_uid}">
  <h1>{$lang->af_advancedshop_inventory_title}</h1>
  <form method="get" action="misc.php" class="af-inventory-filters">
    <input type="hidden" name="action" value="inventory">
    <input type="hidden" name="uid" value="{$inventory_uid}">
    <input type="text" name="q" value="{$mybb->input['q']}" placeholder="Search">
    <select name="rarity">
      <option value="">Все редкости</option>
      <option value="common" {$rarity_common_selected}>common</option>
      <option value="uncommon" {$rarity_uncommon_selected}>uncommon</option>
      <option value="rare" {$rarity_rare_selected}>rare</option>
      <option value="epic" {$rarity_epic_selected}>epic</option>
      <option value="legendary" {$rarity_legendary_selected}>legendary</option>
    </select>
    <button type="submit" class="af-shop-btn">Filter</button>
  </form>
  {$inventory_grid}
</div>
