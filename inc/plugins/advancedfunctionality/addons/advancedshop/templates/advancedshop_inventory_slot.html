<div class="af-inventory-slot af-inv-slot rarity-{$inv_rarity}" draggable="true" data-tooltip-id="tip-{$inv_id}" data-inv-id="{$inv_id}" data-kb-id="{$inv_kb_id}" data-rarity="{$inv_rarity}" data-kind="{$inv_kind}" data-equip-slot="{$inv_equip_slot}" data-is-equippable="{$inv_is_equippable}" data-source-type="{$inv_source_type}" data-is-visual-item="{$inv_is_visual_item}" data-appearance-active="{$inv_appearance_active}" data-appearance-target="{$inv_appearance_target}" data-title="{$inv_title}" data-tooltip="{$inv_tooltip}">
  <img src="{$inv_icon}" alt="{$inv_title}">
  <span class="af-inventory-qty">{$inv_qty}</span>
  <div class="af-inventory-tooltip" id="tip-{$inv_id}">
    <strong>{$inv_title}</strong>
    <div>{$tooltip_body}</div>
  </div>
</div>
