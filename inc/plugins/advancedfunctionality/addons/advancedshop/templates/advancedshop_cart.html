<div class="af-cart" data-shop="{$shop_code}">
  <h1>{$lang->af_advancedshop_cart_title}</h1>
  <div class="af-shop-toolbar af-cart-top-links">
    <div class="af-shop-toolbar__left">
      <a class="af-shop-btn" href="{$shop_url}">← {$lang->af_advancedshop_back_to_shop}</a>
      <a class="af-shop-btn" href="misc.php?action=inventory">Инвентарь</a>
    </div>
  </div>
  <div class="af-cart-items">{$itemsHtml}</div>
  <div class="af-cart-total">
    <div>{$lang->af_advancedshop_balance}: {$balance} {$currency_symbol}</div>
    <div>{$lang->af_advancedshop_total}: {$total} {$currency_symbol}</div>
    {$msg}
    <button class="af-shop-btn af-checkout" {$can_checkout}>{$lang->af_advancedshop_btn_checkout}</button>
  </div>
  <div class="af-shop-toasts" aria-live="polite"></div>
