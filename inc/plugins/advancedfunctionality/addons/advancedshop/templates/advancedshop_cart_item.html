<div class="af-cart-item" data-item-id="{$item_id}">
  <img src="{$item_icon}" alt="">
  <div class="af-cart-item__body"><strong>{$item_title}</strong><div>{$price} {$currency_symbol} × {$qty} = {$sum} {$currency_symbol}</div></div>
  <div class="af-cart-item__qty">
    <button class="af-cart-qty" data-delta="-1">-</button>
    <span>{$qty}</span>
    <button class="af-cart-qty" data-delta="1">+</button>
    <button class="af-cart-remove">×</button>
  </div>
</div>
