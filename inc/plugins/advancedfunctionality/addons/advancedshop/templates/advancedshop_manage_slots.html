<div class="af-manage-slots" data-shop="{$shop_code}" data-cat-id="{$cat_id}">
  <h1>Manage Slots — {$category_title}</h1>
  <input type="hidden" id="af_shop_post_key" value="{$mybb->post_code}">
  <script>
    window.AFSHOP = window.AFSHOP || {};
    window.AFSHOP.postKey = "{$mybb->post_code}";
  </script>

  <div class="af-manage-slots-toolbar">
    <a class="button" href="{$manage_url}">← Back to manage</a>
    <a class="button" href="{$manage_url}">← Back to categories</a>
    <button type="button" class="af-shop-btn" id="af-add-slot-btn">Add Slot</button>
    <span id="af-manage-slot-status" aria-live="polite"></span>
  </div>

  <div id="af-manage-slots-body" class="af-manage-slots-grid"></div>

  <div id="af-kb-picker" hidden>
    <h3>Добавить из KB</h3>
    <div class="af-kb-picker-filters">
      <label>Type
        <select id="af-kb-picker-type">
          <option value="all">All</option>
          <option value="item">Item</option>
          <option value="spell">Spell / Ritual</option>
        </select>
      </label>
      <label>Search
        <input type="text" id="af-kb-picker-q" placeholder="Search by title or key/slug">
      </label>
      <label>Rarity
        <input type="text" id="af-kb-picker-rarity" placeholder="rare, uncommon...">
      </label>
      <label>Item type
        <input type="text" id="af-kb-picker-item-type" placeholder="weapon, armor...">
      </label>
      <label>Spell level
        <input type="text" id="af-kb-picker-spell-level" placeholder="1,2,3...">
      </label>
      <label>Spell school
        <input type="text" id="af-kb-picker-spell-school" placeholder="evocation...">
      </label>
    </div>
    <div id="af-kb-picker-results"></div>
  </div>
  <div class="af-kb-picker-filters" style="margin-top:10px;">
    <label>Источник
      <select id="af-slot-source-type">
        <option value="kb">KB</option>
        <option value="appearance">Appearance (profile_banner)</option>
      </select>
    </label>
  </div>

  <div id="af-appearance-picker" hidden>
    <h3>Добавить пресет Appearance</h3>
    <div class="af-kb-picker-filters">
      <label>Search
        <input type="text" id="af-appearance-picker-q" placeholder="Search by title/description">
      </label>
    </div>
    <div id="af-appearance-picker-results"></div>
  </div>

</div>
