<div class="af-shop-wrap" data-shop="{$shop_code}">
  <div class="af-shop-title-row"><h1>{$shop_title}</h1>{$shop_manage_button}</div>
  <div class="af-shop-toolbar">
    <div class="af-shop-toolbar__left">
      <a class="af-shop-btn" href="{$cart_url}">{$lang->af_advancedshop_btn_go_to_cart}</a>
      {$inventory_link}
    </div>
    <div class="af-shop-toolbar__right">{$balance_badge}</div>
  </div>
  <div class="af-shop-layout">
    <aside class="af-shop-cats">{$cats}</aside>
    <section class="af-shop-grid">{$slotsHtml}</section>
  </div>
  <div class="af-shop-toasts" aria-live="polite"></div>
</div>
