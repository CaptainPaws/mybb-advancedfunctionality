<div class="af-shop-card {$slot_rarity_class} rarity-{$slot_rarity}">
  <div class="af-shop-card__icon"><img src="{$slot_icon}" alt=""></div>
  <h3><a href="{$slot_kb_url}" class="af-kb-chip" data-kb-type="{$slot_kb_type}" data-kb-key="{$slot_kb_key}" data-kb-title="{$slot_title}"><span class="af-kb-chip-label">{$slot_title}</span></a></h3>
  <p>{$slot_short}</p>
  <div class="af-shop-card__price">{$slot_price} {$slot_currency_symbol}</div>
  <div class="af-shop-card__rarity">{$lang->af_advancedshop_rarity_label}: {$slot_rarity_label}</div>
  <div class="af-shop-card__actions">
    <button class="af-shop-btn af-add-cart" data-slot="{$slot_id}">{$lang->af_advancedshop_btn_add_to_cart}</button>
    <button class="af-shop-btn af-buy-now" data-slot="{$slot_id}">{$lang->af_advancedshop_btn_buy}</button>
  </div>
</div>
