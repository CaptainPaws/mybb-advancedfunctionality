<a class="af-cs-catalog-card" href="{$sheet_url}" data-afcs-card data-name="{$card_name_en} {$card_name_ru}" data-race="{$card_race_label}" data-class="{$card_class_label}" data-theme="{$card_theme_label}">
  <div class="af-cs-catalog-portrait">
    <img src="{$card_portrait}" alt="{$card_name_en}" loading="lazy" />
  </div>
  <div class="af-cs-catalog-body">
    <div class="af-cs-catalog-name">{$card_name_en}</div>
    <div class="af-cs-catalog-sub">{$card_name_ru}</div>
    <div class="af-cs-catalog-chips">
      {$card_race_chip}{$card_class_chip}{$card_theme_chip}
    </div>
  </div>
</a>
