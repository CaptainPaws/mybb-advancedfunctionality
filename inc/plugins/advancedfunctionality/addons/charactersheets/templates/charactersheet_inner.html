<div class="af-cs-page">
  <div class="af-cs-hero">
    <div class="af-cs-portrait">
      <img src="{$sheet_portrait_url}" alt="{$sheet_title}" loading="lazy" />
    </div>
    <div class="af-cs-summary">
      <div class="af-cs-summary__head">
        <h1>{$sheet_title}</h1>
        <div class="af-cs-subtitle">{$sheet_subtitle}</div>
      </div>
      <div class="af-cs-summary__meta">
        {$sheet_base_html}
      </div>
      <div class="af-cs-summary__stats">
        {$sheet_stats_html}
      </div>
    </div>
  </div>

  <section class="af-cs-section">
    <h2>Раса / Класс / Тема</h2>
    {$sheet_kb_html}
  </section>

  <section class="af-cs-section">
    <h2>Атрибуты</h2>
    {$sheet_attributes_html}
  </section>

  <section class="af-cs-section">
    <h2>Навыки</h2>
    {$sheet_skills_html}
  </section>

  <section class="af-cs-section">
    <h2>Скиллы</h2>
    {$sheet_feats_html}
  </section>
</div>
