<div class="af-cs-plaque">
  <div class="af-cs-postbit-stats">
    <div class="af-cs-postbit-stats__level">Level {$level}</div>
    <div class="af-cs-postbit-stats__bar"><span style="width: {$progress_percent}%">{$exp_current} / {$exp_need}</span></div>
    <div class="af-cs-postbit-stats__credits">Credits: {$credits} {$currency_symbol}</div>
  </div>
  <a class="af-cs-plaque__btn" href="{$sheet_url}" data-afcs-open="1" data-slug="{$sheet_slug}" data-afcs-sheet="{$sheet_url}">
    {$button_label}
  </a>
</div>
