<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

  <!-- tiny numbers (extra thin) -->
  <g stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1 -->
    <line x1="5.4" y1="5.4" x2="5.4" y2="7.6"></line>

    <!-- 2 (tiny, 7-seg style) -->
    <line x1="4.4" y1="10.9" x2="6.2" y2="10.9"></line>
    <line x1="6.2" y1="10.9" x2="6.2" y2="12.0"></line>
    <line x1="6.2" y1="12.0" x2="4.4" y2="12.0"></line>
    <line x1="4.4" y1="12.0" x2="4.4" y2="13.1"></line>
    <line x1="4.4" y1="13.1" x2="6.2" y2="13.1"></line>

    <!-- 3 (tiny, 7-seg style) -->
    <line x1="4.4" y1="16.4" x2="6.2" y2="16.4"></line>
    <line x1="6.2" y1="16.4" x2="6.2" y2="17.5"></line>
    <line x1="4.7" y1="17.5" x2="6.2" y2="17.5"></line>
    <line x1="6.2" y1="17.5" x2="6.2" y2="18.6"></line>
    <line x1="4.4" y1="18.6" x2="6.2" y2="18.6"></line>
  </g>

  <!-- list lines (normal weight) -->
  <line x1="10" y1="6.5" x2="20" y2="6.5"></line>
  <line x1="10" y1="12" x2="20" y2="12"></line>
  <line x1="10" y1="17.5" x2="20" y2="17.5"></line>
</svg>
