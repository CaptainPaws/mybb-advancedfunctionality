<div class="af-cs-postbit-stats af-cs-postbit-stats--compact" data-af-balance-inline="1" data-pid="{$post['pid']}" data-uid="{$post['uid']}">
  <div class="af-cs-postbit-stats__grid af-cs-postbit-stats__grid--compact">
    <div class="af-cs-postbit-stat af-cs-postbit-stat--credits" data-af-balance-credits="1">
      <div class="af-cs-postbit-stat__icon">{$postbit_label_credits_html}</div>
      <div class="af-cs-postbit-stat__value" data-af-balance-credits-value="1">{$credits_display} {$currency_symbol}</div>
    </div>
    {$ability_tokens_postbit_html}
    <div class="af-cs-postbit-stat af-cs-postbit-stat--level" data-af-balance-level="1">
      <div class="af-cs-postbit-stat__icon">{$postbit_label_level_html}</div>
      <div class="af-cs-postbit-stat__value" data-af-balance-level-value="1">{$level}</div>
    </div>
    <div class="af-cs-postbit-stat af-cs-postbit-stat--posts" data-af-balance-posts="1">
      <div class="af-apc-slot" data-af-apc-slot="1" data-uid="{$post['uid']}">{$af_apc_postbit_html}</div>
    </div>
  </div>
</div>
